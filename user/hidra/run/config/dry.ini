[LogCollector.log]
EULOG_GUI_LOG_FILE_PATTERN = logs/dryrun_run$3R_$12D.log
LOG_LEVEL_PRINT = 0           # 0 DEBUG, 1 OK, 2 THROW etc...
LOG_LEVEL_WRITE = 0

[DataCollector.HidraDataCollector]
REPLAY_MODE = 1

[Producer.DryXDCProducer]


[Producer.DryFERSProducer]

[Monitor.HidraHttpMonitor]

PUMP_INTERVAL_MS = 20      # Refresh rate for the monitor web server.
HTTP_PORT = 9090           # Port for the monitor web server.
EVENT_PRESCALE = 1         # Process every Nth event for monitoring. Set to 1 to process all events, >1 to reduce load.
HISTO_OUTPUT_PATTERN = out_data/monitor_run$6R_$12D$X   # FileNamer pattern for the ROOT file saved at end-of-run: $R run number, $D timestamp, $X extension (.root); an optional width prefix pads, e.g. $6R, $12D. Empty to disable.
