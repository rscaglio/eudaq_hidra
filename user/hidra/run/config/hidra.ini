# example init file: Ex0.ini
[LogCollector.log]
EULOG_GUI_LOG_FILE_PATTERN = logs/hidra_daq_$12D.log
LOG_LEVEL_PRINT = 0           # 0 DEBUG, 1 OK, 2 THROW etc...
LOG_LEVEL_WRITE = 0

[Producer.QTPDProducer]
EX0_DEV_LOCK_PATH = /tmp/mydev0.lock
ControllerType = V2718
#LinkOrPid = 49086
LinkOrPid = 0

# FERS2 producer settings
# Class = HidraFERS2Producer
# FERS_CONF_FILE = /home/rscaglio/work/eudaq_hidra/user/hidra/fers/misc/conf/FERSlib_Config1.txt


[Monitor.HidraHttpMonitor]
PUMP_INTERVAL_MS = 20      # Refresh rate for the monitor web server.
HTTP_PORT = 9090           # Port for the monitor web server.
EVENT_PRESCALE = 1         # Process every Nth event for monitoring. Set to 1 to process all events, >1 to reduce load.
HISTO_OUTPUT_PATTERN = out_data/monitor_run$6R_$12D$X   # FileNamer pattern for the ROOT file saved at end-of-run ($R run, $D date, $X .root). Empty to disable.
