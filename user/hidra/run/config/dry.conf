[RunControl]
config_log_path = logs/
EUDAQ_CTRL_PRODUCER_LAST_START = DryXDCProducer
EUDAQ_CTRL_PRODUCER_FIRST_STOP = DryXDCProducer

[Producer.DryXDCProducer]
EUDAQ_DC = HidraDataCollector
DATA_IN_PATH = data/RawData-2025.09.04-06.57.38.run632.txt

[DataCollector.HidraDataCollector]
# connection to the monitor
EUDAQ_MN = my_mon
EUDAQ_FW = native
EUDAQ_FW_PATTERN = out_data/run$3R_$12D$X
EUDAQ_DATACOL_SEND_MONITOR_FRACTION = 10
# config-parameters of the example data collector
MAX_EVENTS = 100000
EXPECTED_SOURCES = DryFERSProducer,DryXDCProducer
SYNC_TIMEOUT_US = 1500000;
TIMESTAMP_WINDOW_NS = 1500000000;

[Producer.DryFERSProducer]
EUDAQ_DC = HidraDataCollector
DATA_IN_PATH = data/Run632.0_list.dat
REPLAY_EVENT_SPACING_MS = -1

