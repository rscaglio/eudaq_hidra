[RunControl]
config_log_path = logs/
# EUDAQ_CTRL_PRODUCER_LAST_START = DryXDCProducer
# EUDAQ_CTRL_PRODUCER_FIRST_STOP = DryXDCProducer

[Producer.DryXDCProducer]
EUDAQ_DC = HidraDataCollector
DATA_IN_PATH = data/RawData-2025.09.04-06.57.38.run632.txt
#DATA_IN_PATH = data/RawData-2025.09.04-11.25.24.run654.txt
REPLAY_EVENT_SPACING_MS = 100
HIDRA_MUTE_DEBUG = 0

[DataCollector.HidraDataCollector]
# connection to the monitor
EUDAQ_MN = DryHidraMonitor
EUDAQ_FW = null
EUDAQ_FW_PATTERN = out_data/dryrun_run$3R_$12D$X
#EUDAQ_DATACOL_SEND_MONITOR_FRACTION = 10
EUDAQ_DATACOL_SEND_MONITOR_FRACTION = 1
# file output toggles
WRITE_BINARY_OUTPUT = 1
WRITE_ROOT_OUTPUT = 1
WRITER_FLUSH_INTERVAL_MS = 50
# config-parameters of the example data collector
MAX_EVENTS = 100000
EXPECTED_SOURCES = 6:DryXDCProducer,7:DryFERSProducer
SYNC_TIMEOUT_US = 150000000
TIME_ALIGNMENT_ENABLE = 0
TIME_ALIGNMENT_WINDOW_NS = 500000
TIME_ALIGNMENT_NEVENTS_CALIB = 100
VME_CRATE_1 = 0:V792,1:V792,2:V792,3:V792,4:V792,5:V792
HIDRA_MUTE_DEBUG = 0

[Producer.DryFERSProducer]
EUDAQ_DC = HidraDataCollector
DATA_IN_PATH = data/Run632.0_list.dat
#DATA_IN_PATH = data/Run654.0_list.dat
REPLAY_EVENT_SPACING_MS = 100
HIDRA_MUTE_DEBUG = 0

[Monitor.HidraHttpMonitor]
VME_CRATE_1 = 0:V792,1:V792,2:V792,3:V792,4:V792,5:V792