# example config file: Ex0.conf
[RunControl]
config_log_path = logs/
# from the base RunControl.cc
EUDAQ_CTRL_PRODUCER_LAST_START = QTPDProducer
EUDAQ_CTRL_PRODUCER_FIRST_STOP = QTPDProducer
# Steer which values to display in the GUI: producerName and displayed value are seperated by a ",". 
#ADDITIONAL_DISPLAY_NUMBERS = "log,_SERVER"

[Producer.QTPDProducer]
EUDAQ_DC = HidraDataCollector
# connection to the data collector
# config-parameters of the example producer
EX0_PLANE_ID = 0
EX0_DURATION_BUSY_MS = 10
# EX0_ENABLE_TIMESTAMP = 0 
EX0_ENABLE_TRIGERNUMBER = 1
EX0_DEV_LOCK_PATH = mylock0
#EX0_MAX_EVENTS = 100

Iped = 100

Board0.Enable = 1
Board0.BaseAddress = 0x06000000
Board0.GeoAddress = 2
Board0.CrateNumber = 2

Board1.Enable = 1
Board1.BaseAddress = 0x05000000
Board1.GeoAddress = 4
Board1.CrateNumber = 4

Board2.Enable = 1
Board2.BaseAddress = 0x09000000
Board2.GeoAddress = 8
Board2.CrateNumber = 8

Board3.Enable = 1
Board3.BaseAddress = 0x88880000
Board3.GeoAddress = 16
Board3.CrateNumber = 16

Board4.Enable = 1
Board4.BaseAddress = 0x0B000000
Board4.GeoAddress = 32
Board4.CrateNumber = 32

[Producer.FERS2Producer]
# FERS2 producer settings
EUDAQ_DC = HidraDataCollector
FERS_CONF_FILE = /home/eudaq/daq/eudaq_hidra/user/hidra/fers/misc/conf/FERSlib_Config1.txt
# FERS_START_MODE = ASYNC
# FERS_CONFIGURE_MODE = CFG_HARD
# FERS_READOUT_MODE = 0
# FERS_POLL_SLEEP_US = 1000
#FERS_MAX_EVENTS_PER_BOARD = 100
# FERS_SEND_TRIGGER_NUMBER = 1
# FERS_SEND_TIMESTAMP = 1

[DataCollector.HidraDataCollector]
# connection to the monitor
EUDAQ_MN = my_mon
MAX_EVENTS = 0
EUDAQ_FW = native
EUDAQ_FW_PATTERN = out_data/run$3R_$12D$X
EUDAQ_DATACOL_SEND_MONITOR_FRACTION = 10
# file output toggles
WRITE_BINARY_OUTPUT = 1
WRITE_ROOT_OUTPUT = 1
WRITER_FLUSH_INTERVAL_MS = 50
# config-parameters of the example data collector
EX0_DISABLE_PRINT = 1
#EXPECTED_SOURCES = 2:FERS2Producer,1:QTPDProducer
EXPECTED_SOURCES = 1:QTPDProducer
SYNC_TIMEOUT_US = 1000000
TIME_ALIGNMENT_WINDOW_NS = 50000
TIME_ALIGNMENT_NEVENTS_CALIB = 100
VME_CRATE_1 = 2:V792,4:V792,8:V792,16:V862, 32:V792 
