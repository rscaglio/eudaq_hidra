# example config file: Ex0.conf
[RunControl]
config_log_path = logs/
# from the base RunControl.cc
EUDAQ_CTRL_PRODUCER_LAST_START = QTPDProducer
EUDAQ_CTRL_PRODUCER_FIRST_STOP = QTPDProducer
# Steer which values to display in the GUI: producerName and displayed value are seperated by a ",". 
#ADDITIONAL_DISPLAY_NUMBERS = "log,_SERVER"

[Producer.QTPDProducer]
EUDAQ_DC = HidraDataCollector
# connection to the data collector
# config-parameters of the example producer

HIDRA_MUTE_DEBUG = 0

Iped = 100

V977_BASE = 0x01000000   # I/O

# Multicast role is derived automatically from the enabled board order.
# Otherwise use:
# BoardN.MulticastRole = FIRST / MIDDLE / LAST

Board0.Enable = 1
Board0.BaseAddress = 0x06000000
Board0.GeoAddress = 2
Board0.CrateNumber = 1
Board0.Type = V792


Board1.Enable = 1
Board1.BaseAddress = 0x05000000
Board1.GeoAddress = 4
Board1.CrateNumber = 1
Board1.Type = V792


Board2.Enable = 1
Board2.BaseAddress = 0x09000000
Board2.GeoAddress = 6
Board2.CrateNumber = 1
Board2.Type = V792


Board3.Enable = 1
Board3.BaseAddress = 0x88880000
Board3.GeoAddress = 8
Board3.CrateNumber = 1
Board3.Type = V792


Board4.Enable = 1
Board4.BaseAddress = 0x0B000000
Board4.GeoAddress = 10
Board4.CrateNumber = 1
Board4.Type = V792


[Producer.FERS2Producer]
# FERS2 producer settings
EUDAQ_DC = HidraDataCollector
HIDRA_MUTE_DEBUG = 0
FERS_CONF_FILE = /home/eudaq/daq/eudaq_hidra/user/hidra/run/config/janus/FERSlib_Config_oneboard.txt
# FERS_START_MODE = ASYNC
# FERS_CONFIGURE_MODE = CFG_HARD
# FERS_READOUT_MODE = 0
FERS_POLL_SLEEP_US = 1
# FERS_MAX_EVENTS_PER_BOARD (legacy name): global cap on the total number
# of FERSEvents returned by a single `ReadAvailableEvents` call. With
# concentrator/TDL batch reads this no longer strictly limits events per
# individual board. Set to 0 to indicate "no limit" (default behavior).
# Example: uncomment to cap to 100 events per call
#FERS_MAX_EVENTS_PER_BOARD = 100
# Poll Vmon, Imon, temperatures and HV status every N seconds. 0 disables it.
FERS_STATUS_POLL_INTERVAL_S = 10
# Also poll once after 2 seconds without read events, ignoring the interval timeout.
POLL_MONITOR_OUT_OF_SPILL = 0
FERS_STATUS_ATTACH_TAGS = 0
FERS_SEND_TIMESTAMP = 1

[DataCollector.HidraDataCollector]
# connection to the monitor
EUDAQ_MN = HidraHttpMonitor
MAX_EVENTS = 0 
# we are using another writer, manually handled in the code
EUDAQ_FW = HidraNullFileWriter
EUDAQ_FW_PATTERN = out_data/run$3R_$12D$X
EUDAQ_DATACOL_SEND_MONITOR_FRACTION = 10
# file output toggles
WRITE_BINARY_OUTPUT = 1
WRITE_ROOT_OUTPUT = 1
WRITER_FLUSH_INTERVAL_MS = 50

EXPECTED_SOURCES = 2:FERS2Producer,1:QTPDProducer
SYNC_TIMEOUT_US = 1000000
TIME_ALIGNMENT_ENABLE = 1
TIME_ALIGNMENT_WINDOW_NS = 300000
TIME_ALIGNMENT_NEVENTS_CALIB = 100
VME_CRATE_1 = 2:V792,4:V792,6:V792,8:V792,10:V792 

HIDRA_MUTE_DEBUG = 0

[Monitor.HidraHttpMonitor]
VME_CRATE_1 = 2:V792,4:V792,6:V792,8:V792,10:V792
